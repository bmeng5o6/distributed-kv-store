services:
  node1:
    build: .
    ports:
      - "8080:8080"
    command: ["--port", "8080", "--host", "node1", "--peers", "node2:8081,node3:8082"]

  node2:
    build: .
    ports:
      - "8081:8081"
    command: ["--port", "8081", "--host", "node2", "--peers", "node1:8080,node3:8082"]

  node3:
    build: .
    ports:
      - "8082:8082"
    command: ["--port", "8082", "--host", "node3", "--peers", "node1:8080,node2:8081"]